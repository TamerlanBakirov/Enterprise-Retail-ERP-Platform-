<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d6a9f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8453c"/>
      <stop offset="100%" style="stop-color:#ff6b5a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Stylized storefront / building -->
  <rect x="120" y="200" width="272" height="196" rx="8" fill="#ffffff" opacity="0.95"/>
  <!-- Roof / awning -->
  <path d="M100 210 L256 120 L412 210 Z" fill="url(#accent)"/>
  <!-- Door -->
  <rect x="222" y="300" width="68" height="96" rx="6" fill="#1e3a5f"/>
  <circle cx="280" cy="348" r="5" fill="#ffd700"/>
  <!-- Left window -->
  <rect x="140" y="240" width="60" height="44" rx="4" fill="#1e3a5f" opacity="0.8"/>
  <line x1="170" y1="240" x2="170" y2="284" stroke="#ffffff" stroke-width="2"/>
  <line x1="140" y1="262" x2="200" y2="262" stroke="#ffffff" stroke-width="2"/>
  <!-- Right window -->
  <rect x="312" y="240" width="60" height="44" rx="4" fill="#1e3a5f" opacity="0.8"/>
  <line x1="342" y1="240" x2="342" y2="284" stroke="#ffffff" stroke-width="2"/>
  <line x1="312" y1="262" x2="372" y2="262" stroke="#ffffff" stroke-width="2"/>
  <!-- Georgian cross (Bolnisi cross) accent -->
  <g transform="translate(256, 430)" fill="#ffd700">
    <rect x="-16" y="-4" width="32" height="8" rx="2"/>
    <rect x="-4" y="-16" width="8" height="32" rx="2"/>
    <circle cx="-12" cy="-12" r="3"/>
    <circle cx="12" cy="-12" r="3"/>
    <circle cx="-12" cy="12" r="3"/>
    <circle cx="12" cy="12" r="3"/>
  </g>
  <!-- Bar chart icon (analytics) -->
  <g transform="translate(370, 330)" fill="#ffffff" opacity="0.9">
    <rect x="0" y="20" width="10" height="30" rx="2"/>
    <rect x="14" y="10" width="10" height="40" rx="2"/>
    <rect x="28" y="0" width="10" height="50" rx="2"/>
  </g>
</svg>
